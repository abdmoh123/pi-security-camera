name: test-server
on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
        with:
          version: 2026.3.10 # [default: latest] mise version to install
          working_directory: ./server # [default: .] directory to run mise in
      - run: ls .
      - run: mise run lint
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
        with:
            version: 2026.3.10 # [default: latest] mise version to install
            working_directory: ./server # [default: .] directory to run mise in
      - run: mise run test
