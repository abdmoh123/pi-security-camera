name: test-server
on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./server
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
        with:
          version: 2026.3.10
      - run: mise run lint

  test:
    runs-on: ubuntu-latest
    environment: development
    env:
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      DB_TYPE: ${{ vars.DB_TYPE }}
      JWT_ALGORITHM: ${{ vars.JWT_ALGORITHM }}
    defaults:
      run:
        working-directory: ./server
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
        with:
            version: 2026.3.10
      - run: mise run test
